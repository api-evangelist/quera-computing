description: QuEra Computing is a Boston-based neutral-atom quantum computing company (founded 2018) that operates
  Aquila, a 256-qubit Analog Hamiltonian Simulation QPU available publicly through Amazon Braket, and Gemini-class,
  a 260-qubit gate-model neutral-atom system used for fault-tolerant logical-qubit research with Harvard and MIT.
  QuEra has no native public REST API; developers submit programs to Aquila through the AWS Braket task API
  using QuEra's Bloqade SDKs (bloqade-analog for Python hardware submission, Bloqade.jl for Julia emulation,
  bloqade-circuit for gate-model programs), built on the Kirin compiler IR. Additional open-source tools include
  tsim (QEC circuit sampling), bloqade-shuttle, bloqade-lanes, and bloqade-decoders for the Dynamic Qubit Array
  compilation stack.
