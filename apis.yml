  description: Aquila is QuEra's 256-qubit neutral-atom quantum computer, the first publicly accessible neutral-atom
    QPU. It runs Analog Hamiltonian Simulation (AHS) programs and is accessed programmatically through Amazon
    Braket via the device ARN arn:aws:braket:us-east-1::device/qpu/quera/Aquila in us-east-1. Pricing is $0.30
    per task plus $0.01 per shot. Specs include a 76 by 75 micron workspace, 4 micron minimum atom distance,
    Rabi frequency 0 to 2.5 times 2 pi MHz, and global Rydberg detuning -20 to 20 times 2 pi MHz. There is no
    QuEra-operated REST API; programs are submitted through the AWS Braket task API.
- aid: quera-computing:quera-gemini-system
  name: QuEra Gemini Neutral-Atom Quantum Computer
  tags:
  - Quantum Computing
  - Neutral Atom
  - Gate Model
  - Gemini
  - Fault Tolerance
  humanURL: https://www.quera.com/gemini
  properties:
  - url: https://www.quera.com/gemini
    type: Documentation
  - url: https://www.quera.com/contact
    type: Contact
  description: Gemini-class is QuEra's gate-model neutral-atom quantum computer with 260 Rubidium-87 physical
    qubits, all-to-all connectivity across two operational zones (storage and entanglement), and Dynamic Qubit
    Array (DQA) shuttling. Reported fidelities are 99.9 percent (global 1-qubit), 99.7 percent (local 1-qubit),
    99.2 percent (2-qubit), with up to 20 parallel 2-qubit gate pairs at 1 shot per second. Access is via pilot
    collaboration and premium customer engagement rather than a public self-service API. Gemini is the platform
    on which QuEra (with Harvard and MIT) demonstrated fault-tolerant magic-state distillation.
