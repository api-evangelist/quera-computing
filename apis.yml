  description: Bloqade Analog (pip install bloqade-analog) is QuEra's Python SDK for writing, simulating, and
    submitting analog Hamiltonian programs to QuEra neutral-atom QPUs. It provides a hardware-first programming
    model with .braket.aquila().run_async() to submit jobs to Aquila on Amazon Braket, plus emulator backends
    for parameter sweeps and result analysis. Latest release v0.16.9 (March 2026).
